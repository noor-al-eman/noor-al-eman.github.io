<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>نور الإيمان</title>


<style>


* {
  box-sizing: border-box;
}


body {

  font-family: Arial, sans-serif;

  background: #032b24;

  color: #cacd0c;

  display: flex;

  justify-content: center;

  align-items: center;

  min-height: 100vh;

  margin: 0;

  padding: 20px;

  flex-direction: column;

}



/* TITLE IMAGE */

.brand {

  width: 700px;

  max-width: 90%;

  height: auto;

  margin-bottom: 50px;

  display: block;

  object-fit: contain;
  transform: translateX(22px);

}



/* LOGIN BOX */

.box {

  width: 90%;

  max-width: 400px;

  background: rgba(0,0,0,0.25);

  border: 2px solid #cacd0c;

  border-radius: 25px;

  padding: 35px 25px;

  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  animation: fade 0.5s ease;

}





/* INPUTS */

input {

  width: 90%;

  padding: 15px;

  margin: 10px;

  border-radius: 12px;

  border: 2px solid #cacd0c;

  background: #05594b;

  color: #cacd0c;

  font-size: 16px;

}


input::placeholder {

  color: #cacd0c;

  opacity: 0.8;

}





/* BUTTON */

button {

  margin-top: 15px;

  padding: 14px 35px;

  border: 2px solid #cacd0c;

  background: #034d40;

  color: #cacd0c;

  border-radius: 12px;

  cursor: pointer;

  font-size: 18px;

  font-weight: bold;

  transition: 0.2s;

}


button:hover {

  transform: scale(1.05);

}





/* ANIMATION */

@keyframes fade {


from {

opacity:0;

transform:translateY(20px);

}


to {

opacity:1;

transform:translateY(0);

}


}





/* PHONE */

@media(max-width:600px){


body {

padding: 15px;

}


.brand {

width: 95%;

max-width: 350px;

margin-bottom: 35px;

}


.box {

width: 95%;

padding: 25px 15px;

}


input {

width: 95%;

font-size: 15px;

}


button {

width: 70%;

}


}



</style>

</head>



<body>



<img 
src="title.png" 
class="brand"
alt="نور الإيمان">



<div class="box">



<input
id="username"
placeholder="اسم الطالب">



<input
id="password"
type="password"
placeholder="كلمة مرور الإدارة">



<button onclick="login()">

دخول

</button>



</div>





<script>

function login() {


const username =
document.getElementById("username").value.trim();


const password =
document.getElementById("password").value.trim();



if(password === "1234"){


localStorage.setItem(
"admin",
"true"
);


window.location.href =
"admin.html";


}


else {


if(username === ""){

alert("اكتب اسم الطالب");

return;

}



localStorage.setItem(
"studentName",
username
);


window.location.href =
"student.html";


}



}



</script>


</body>

</html>
