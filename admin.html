<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>


<style>


@font-face {

  font-family: NoorFont;

  src: url("fonter.otf");

}



* {

  box-sizing: border-box;

}



body {

  font-family: NoorFont, Arial;

  background: #032b24;

  margin: 0;

  padding: 12px;

  color: #cacd0c;

  direction: rtl;

  text-align: right;

}



h1 {

  font-size: 22px;

  margin-bottom: 10px;

  color: #cacd0c;

}





.student {


  background: #034d40;


  padding: 12px;


  margin-top: 10px;


  border-radius: 12px;


  border: 2px solid black;


  box-shadow: 0 2px 6px rgba(0,0,0,0.25);


}





.name {


  font-size: 18px;


  font-weight: bold;


  color: #cacd0c;


}





.points {


  font-size: 14px;


  margin: 6px 0;


  color: #cacd0c;


}





input {


  width: 100%;


  padding: 10px;


  margin-top: 6px;


  border-radius: 8px;


  border: 2px solid black;


  box-sizing: border-box;


  color: #cacd0c;


  background: #034d40;


}





input::placeholder {


  color: #cacd0c;


}





select {


  width: 100%;


  padding: 10px;


  margin-top: 8px;


  border-radius: 10px;


  border: 2px solid black;


  font-size: 16px;


  font-weight: 600;


  cursor: pointer;


}





button {


  width: 100%;


  padding: 10px;


  margin-top: 8px;


  border: 2px solid black;


  border-radius: 8px;


  color: white;


  font-size: 14px;


}





.save {


  background: rgb(15,80,64);


}





.logout {


  background:black;


}





.addStudent {


  background:rgb(10,117,94);


}





.topBox {


  background:#034d40;


  padding:12px;


  border-radius:12px;


  margin-bottom:12px;


  border:2px solid black;


}





label {


  color:#cacd0c;


  font-weight:bold;


}





hr {


 border-color:black;


}





@media (min-width:700px){



body {


max-width:800px;


margin:auto;


}





button {


width:auto;


padding:10px 15px;


}





input {


width:auto;


}





select {


width:auto;


}



}





</style>

</head>



<body>


<script>

if(localStorage.getItem("admin") !== "true"){

window.location.href="index.html";

}

</script>





<h1>لوحة التحكم</h1>





<button class="logout" onclick="logout()">

تسجيل الخروج

</button>







<div class="topBox">



<h3>إضافة طالب</h3>





<input id="newName" placeholder="اسم الطالب">





<input id="newPoints" type="number" placeholder="النقاط">





<input id="newSchool" placeholder="المدرسة">





<input id="newProject" placeholder="آخر مشروع">







<button class="addStudent" onclick="addStudent()">


إضافة طالب


</button>



</div>









<div id="students"></div>







<button class="save" onclick="saveAllChanges()">


حفظ التغييرات


</button>








<script>





const API_URL =

"https://script.google.com/macros/s/AKfycbziHTPIKYehe8NEZStkfbh6uWL16TNxnQ9aaa0tXqFM6bpq6hcSupBUg1mIM1EYpnUK/exec";





let students=[];








function loadStudents(){



fetch(API_URL)


.then(res=>res.json())


.then(data=>{





students=data.slice(1);





const container=document.getElementById("students");



container.innerHTML="";







students.forEach((row,i)=>{





const name=row[0];


const total=Number(row[1])||0;


const school=row[2]||"";


const project=row[3]||"";


const attendance=Number(row[4])||0;


const work=Number(row[5])||0;


const match=Number(row[6])||0;









const div=document.createElement("div");


div.className="student";







div.innerHTML=`



<div class="name">${name}</div>





<div class="points">

مجموع النقاط: ${total}

</div>







<input id="school-${i}" value="${school}" placeholder="آخر اختبار">





<input id="project-${i}" value="${project}" placeholder="الحلقة">







<hr>







<label>الحضور</label>





<select id="attendance-${i}" onchange="changeAttendanceColor(this)">





<option value="5" ${attendance==5?"selected":""}>

حاضر

</option>





<option value="3" ${attendance==3?"selected":""}>

متأخر

</option>





<option value="0" ${attendance==0?"selected":""}>

غائب

</option>





</select>









<label>التسميع</label>





<select id="work-${i}" onchange="changeWorkColor(this)">





<option value="5" ${work==5?"selected":""}>

سمع

</option>





<option value="0" ${work==0?"selected":""}>

لم يسمع

</option>





</select>







<input id="match-${i}" type="number" value="${match}" placeholder="نقاط المباراة">





`;







container.appendChild(div);






changeAttendanceColor(

document.getElementById(`attendance-${i}`)

);







changeWorkColor(

document.getElementById(`work-${i}`)

);






});



});



}








function changeAttendanceColor(select){



if(select.value=="5"){


select.style.background="#64efa8";


select.style.color="#065f46";


}


else if(select.value=="3"){


select.style.background="#ffe789";


select.style.color="#92400e";


}


else{


select.style.background="#fa8282";


select.style.color="#991b1b";


}


}









function changeWorkColor(select){



if(select.value=="5"){


select.style.background="#64efa8";


select.style.color="#065f46";


}

else{


select.style.background="#fa8282";


select.style.color="#991b1b";


}


}









async function saveAllChanges(){



for(let i=0;i<students.length;i++){



const name=students[i][0];





const attendance=

Number(document.getElementById(`attendance-${i}`).value);





const work=

Number(document.getElementById(`work-${i}`).value);





const match=

Number(document.getElementById(`match-${i}`).value)||0;







const school=

document.getElementById(`school-${i}`).value;





const project=

document.getElementById(`project-${i}`).value;







await fetch(



`${API_URL}?action=update`

+`&name=${encodeURIComponent(name)}`

+`&attendance=${attendance}`

+`&work=${work}`

+`&match=${match}`

+`&school=${encodeURIComponent(school)}`

+`&project=${encodeURIComponent(project)}`



);





}







alert("تم الحفظ!");



loadStudents();





}









function addStudent(){



const name=

document.getElementById("newName").value.trim();





if(!name){


alert("اكتب اسم الطالب");


return;


}







fetch(



`${API_URL}?action=update`

+`&name=${encodeURIComponent(name)}`

+`&attendance=0`

+`&work=0`

+`&match=0`



)

.then(()=>{



loadStudents();



});





}








function logout(){



localStorage.removeItem("admin");


window.location.href="index.html";



}






window.onload=loadStudents;





</script>



</body>

</html>
